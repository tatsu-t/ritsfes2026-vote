<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>立命祭2026 集計画面</title>
<script>
(async function(){
  const token = sessionStorage.getItem('rits_token_results');
  if (!token) { location.replace('/'); return; }
  try {
    const r = await fetch('/api/auth?token=' + encodeURIComponent(token) + '&page=results');
    const d = await r.json();
    if (!d.valid) { sessionStorage.removeItem('rits_token_results'); location.replace('/'); }
  } catch(e) { /* ネットワークエラー時は続行 */ }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2EF;--card:#fff;--bd:#e4e4e0;
  --text:#1a1a1a;--sub:#888;
  --blue:#5BBDD4;--green:#7DC96E;--yellow:#F5C542;
  --red:#e55;
}
body{
  font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}

/* ヘッダー */
header{
  background:#1a1a1a;color:#fff;
  padding:0 20px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
header h1{font-size:13px;font-weight:900}
.hbtns{display:flex;gap:7px}
.hbtn{
  padding:7px 12px;border:none;border-radius:7px;
  font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
}
.hbtn:hover{opacity:.82}
.hbtn-refresh{background:#2a2a2a;color:#ccc;border:1px solid #444}
.hbtn-csv{background:#2a2a2a;color:#ccc;border:1px solid #444}
.hbtn-reset{background:#5a1515;color:#ffaaaa;border:1px solid #7a2020}

/* 統計バー */
#stats-bar{
  background:var(--card);border-bottom:1px solid var(--bd);
  padding:10px 20px;display:flex;gap:24px;flex-wrap:wrap;
  align-items:center;
}
.stat-item{display:flex;align-items:baseline;gap:4px}
.stat-val{font-size:22px;font-weight:900}
.stat-lbl{font-size:11px;font-weight:700;color:var(--sub)}
#last-updated{margin-left:auto;font-size:11px;color:var(--sub)}
.live-badge{
  display:inline-block;margin-left:6px;
  font-size:10px;font-weight:700;color:#5db85c;
  background:#EEFAEE;padding:2px 7px;border-radius:999px;
}

/* コントロール */
#controls{
  background:var(--card);border-bottom:1px solid var(--bd);
  padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.filter-btn{
  padding:6px 13px;border-radius:999px;border:1.5px solid var(--bd);
  background:var(--bg);font-family:inherit;font-size:11px;font-weight:700;
  color:var(--sub);cursor:pointer;transition:all .15s;
}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.sort-btn{
  padding:6px 12px;border-radius:7px;border:1.5px solid var(--bd);
  background:var(--card);font-family:inherit;font-size:11px;font-weight:700;
  color:var(--sub);cursor:pointer;transition:all .15s;margin-left:auto;
}
.sort-btn.active{background:#EEF9FC;border-color:var(--blue);color:var(--blue)}

/* メイン */
main{padding:18px 18px 60px;max-width:1200px;margin:0 auto}

/* セクション */
.grade-section{margin-bottom:22px}
.grade-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;padding-bottom:7px;
  border-bottom:2px solid var(--bd);
}
.grade-title{font-size:14px;font-weight:900}
.grade-meta{font-size:11px;color:var(--sub);font-weight:700}

/* ランク行 */
.rank-row{
  background:var(--card);border:2px solid var(--bd);border-radius:10px;
  padding:10px 14px;margin-bottom:6px;
  display:flex;align-items:center;gap:12px;
  transition:border-color .2s;
}
.rank-row.gold  {border-color:#FFD700}
.rank-row.silver{border-color:#C0C0C0}
.rank-row.bronze{border-color:#CD7F32}
.rank-badge{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;flex-shrink:0;
  background:#f0f0ed;color:#aaa;
}
.rank-badge.gold  {background:#FFD700;color:#fff}
.rank-badge.silver{background:#C0C0C0;color:#fff}
.rank-badge.bronze{background:#CD7F32;color:#fff}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:900;margin-bottom:4px}
.rank-grade{font-size:10px;color:var(--sub);margin-left:6px;font-weight:400}
.rank-bar-wrap{height:6px;background:#e8e8e4;border-radius:999px;overflow:hidden}
.rank-bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--green));
  transition:width .6s ease;
}
.rank-scores{text-align:right;flex-shrink:0}
.rank-avg{font-size:20px;font-weight:900;color:var(--text)}
.rank-total{font-size:10px;color:var(--sub);margin-top:1px}
.rank-split{display:flex;gap:5px;margin-top:3px;justify-content:flex-end}
.split-s{font-size:10px;font-weight:700;color:var(--blue);background:#EEF9FC;padding:1px 5px;border-radius:4px}
.split-v{font-size:10px;font-weight:700;color:#c88800;background:#FFF8DC;padding:1px 5px;border-radius:4px}

/* テーブル */
#table-view{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
th{background:#f0f0ed;padding:8px 10px;font-weight:700;color:var(--sub);border:1px solid var(--bd);white-space:nowrap;text-align:center}
td{padding:7px 10px;border:1px solid var(--bd);text-align:center}
tr:nth-child(even) td{background:#fafaf8}
.td-name{text-align:left;font-weight:700}
.td-avg{font-size:14px;font-weight:900}
.td-s{color:var(--blue);font-weight:700}
.td-v{color:#c88800;font-weight:700}

/* ローディング */
#loading{
  text-align:center;padding:60px;
  font-size:14px;font-weight:700;color:#ccc;
}

/* トースト */
#toast{
  position:fixed;bottom:18px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#1a1a1a;color:#fff;
  padding:9px 18px;border-radius:9px;
  font-size:12px;font-weight:700;
  opacity:0;transition:all .3s;z-index:999;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <h1>📊 立命祭2026 集計画面</h1>
  <div class="hbtns">
    <button class="hbtn hbtn-refresh" onclick="fetchResults()">🔄 今すぐ更新</button>
    <button class="hbtn hbtn-csv"     onclick="exportCSV()">📥 CSV</button>
    <button class="hbtn hbtn-reset"   onclick="confirmReset()">⚠ リセット</button>
  </div>
</header>

<div id="stats-bar">
  <div class="stat-item">
    <span class="stat-val" id="stat-total">—</span>
    <span class="stat-lbl">投票総数</span>
  </div>
  <div class="stat-item">
    <span class="stat-val" style="color:var(--blue)" id="stat-student">—</span>
    <span class="stat-lbl">在校生票</span>
  </div>
  <div class="stat-item">
    <span class="stat-val" style="color:#c88800" id="stat-visitor">—</span>
    <span class="stat-lbl">来場者票</span>
  </div>
  <div id="last-updated">
    更新中…<span class="live-badge">● 5秒自動更新</span>
  </div>
</div>

<div id="controls">
  <button class="filter-btn active" data-grade="all"   onclick="setFilter(this)">全体</button>
  <button class="filter-btn" data-grade="中学1年" onclick="setFilter(this)">中学1年</button>
  <button class="filter-btn" data-grade="中学2年" onclick="setFilter(this)">中学2年</button>
  <button class="filter-btn" data-grade="中学3年" onclick="setFilter(this)">中学3年</button>
  <button class="filter-btn" data-grade="高校1年" onclick="setFilter(this)">高校1年</button>
  <button class="filter-btn" data-grade="高校2年" onclick="setFilter(this)">高校2年</button>
  <button class="filter-btn" data-grade="高校3年" onclick="setFilter(this)">高校3年</button>
  <div style="display:flex;gap:6px;margin-left:auto">
    <button class="sort-btn active" id="sort-avg"   onclick="setSort('avg')">平均順</button>
    <button class="sort-btn"        id="sort-total" onclick="setSort('total')">投票数順</button>
    <button class="sort-btn"        id="sort-name"  onclick="setSort('name')">会場順</button>
    <button class="sort-btn"        id="view-toggle" onclick="toggleView()">📋 表表示</button>
  </div>
</div>

<main>
  <div id="loading">読み込み中…</div>
  <div id="rank-view"  style="display:none"></div>
  <div id="table-view" style="display:none"></div>
</main>

<div id="toast"></div>

<script>
const GRADE_ORDER = ['中学1年','中学2年','中学3年','高校1年','高校2年','高校3年'];

const VENUES = [
  {id:'c1_1',name:'中1 1組',grade:'中学1年'},
  {id:'c1_2',name:'中1 2組',grade:'中学1年'},
  {id:'c1_3',name:'中1 3組',grade:'中学1年'},
  {id:'c1_4',name:'中1 4組',grade:'中学1年'},
  {id:'c1_5',name:'中1 5組',grade:'中学1年'},
  {id:'c2_1',name:'中2 1組',grade:'中学2年'},
  {id:'c2_2',name:'中2 2組',grade:'中学2年'},
  {id:'c2_3',name:'中2 3組',grade:'中学2年'},
  {id:'c2_4',name:'中2 4組',grade:'中学2年'},
  {id:'c2_5',name:'中2 5組',grade:'中学2年'},
  {id:'c2_6',name:'中2 6組',grade:'中学2年'},
  {id:'c3_1',name:'中3 1組',grade:'中学3年'},
  {id:'c3_2',name:'中3 2組',grade:'中学3年'},
  {id:'c3_3',name:'中3 3組',grade:'中学3年'},
  {id:'c3_4',name:'中3 4組',grade:'中学3年'},
  {id:'c3_5',name:'中3 5組',grade:'中学3年'},
  {id:'c3_6',name:'中3 6組',grade:'中学3年'},
  {id:'h1_a',name:'高1 Aクラス',grade:'高校1年'},
  {id:'h1_b',name:'高1 Bクラス',grade:'高校1年'},
  {id:'h1_c',name:'高1 Cクラス',grade:'高校1年'},
  {id:'h1_d',name:'高1 Dクラス',grade:'高校1年'},
  {id:'h1_e',name:'高1 Eクラス',grade:'高校1年'},
  {id:'h1_f',name:'高1 Fクラス',grade:'高校1年'},
  {id:'h1_g',name:'高1 Gクラス',grade:'高校1年'},
  {id:'h1_h',name:'高1 Hクラス',grade:'高校1年'},
  {id:'h1_i',name:'高1 Iクラス',grade:'高校1年'},
  {id:'h1_j',name:'高1 Jクラス',grade:'高校1年'},
  {id:'h2_a',name:'高2 Aクラス',grade:'高校2年'},
  {id:'h2_b',name:'高2 Bクラス',grade:'高校2年'},
  {id:'h2_c',name:'高2 Cクラス',grade:'高校2年'},
  {id:'h2_d',name:'高2 Dクラス',grade:'高校2年'},
  {id:'h2_e',name:'高2 Eクラス',grade:'高校2年'},
  {id:'h2_f',name:'高2 Fクラス',grade:'高校2年'},
  {id:'h2_g',name:'高2 Gクラス',grade:'高校2年'},
  {id:'h2_h',name:'高2 Hクラス',grade:'高校2年'},
  {id:'h2_i',name:'高2 Iクラス',grade:'高校2年'},
  {id:'h3_a',name:'高3 Aクラス',grade:'高校3年'},
  {id:'h3_b',name:'高3 Bクラス',grade:'高校3年'},
  {id:'h3_c',name:'高3 Cクラス',grade:'高校3年'},
  {id:'h3_d',name:'高3 Dクラス',grade:'高校3年'},
  {id:'h3_e',name:'高3 Eクラス',grade:'高校3年'},
  {id:'h3_f',name:'高3 Fクラス',grade:'高校3年'},
  {id:'h3_g',name:'高3 Gクラス',grade:'高校3年'},
  {id:'h3_h',name:'高3 Hクラス',grade:'高校3年'},
  {id:'h3_i',name:'高3 Iクラス',grade:'高校3年'},
];

let allResults = [];
let currentFilter = 'all';
let currentSort   = 'avg';
let viewMode      = 'rank';
let toastTimer;

// ===== データ取得 =====
async function fetchResults(){
  try{
    const res = await fetch('/api/results', {cache:'no-store'});
    allResults = await res.json();
    render();
    const now = new Date();
    document.getElementById('last-updated').innerHTML =
      `最終更新: ${now.toLocaleTimeString('ja-JP')}<span class="live-badge">● 5秒自動更新</span>`;
  } catch(e){
    toast('⚠ 更新失敗 — 再試行します');
  } finally{
    document.getElementById('loading').style.display='none';
  }
}

// ===== 描画 =====
function render(){
  const total   = allResults.reduce((s,r)=>s+r.total,0);
  const student = allResults.reduce((s,r)=>s+r.studentTotal,0);
  const visitor = allResults.reduce((s,r)=>s+r.visitorTotal,0);
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-student').textContent = student;
  document.getElementById('stat-visitor').textContent = visitor;

  if(viewMode==='rank') renderRank();
  else                  renderTable();
}

function filtered(){
  return currentFilter==='all'
    ? allResults
    : allResults.filter(r=>r.grade===currentFilter);
}

function sorted(list){
  return list.slice().sort((a,b)=>{
    if(currentSort==='avg'){
      const aa=a.total?a.sum/a.total:0, ba=b.total?b.sum/b.total:0;
      return ba-aa;
    }
    if(currentSort==='total') return b.total-a.total;
    // name: VENUES順
    return VENUES.findIndex(v=>v.id===a.venueId)-VENUES.findIndex(v=>v.id===b.venueId);
  });
}

function avg(sum,total){ return total?(sum/total).toFixed(2):'—'; }

function renderRank(){
  const rv = document.getElementById('rank-view');
  document.getElementById('rank-view').style.display='block';
  document.getElementById('table-view').style.display='none';

  const grades = currentFilter==='all'
    ? GRADE_ORDER.filter(g=>allResults.some(r=>r.grade===g))
    : [currentFilter];

  let html='';
  for(const grade of grades){
    const list = sorted(allResults.filter(r=>r.grade===grade && r.total>0));
    const allInGrade = allResults.filter(r=>r.grade===grade);
    if(allInGrade.length===0) continue;
    const gTotal = allInGrade.reduce((s,r)=>s+r.total,0);
    const maxAvg = list.reduce((m,r)=>Math.max(m,r.total?r.sum/r.total:0),0);

    html+=`<div class="grade-section">
      <div class="grade-header">
        <span class="grade-title">${grade}</span>
        <span class="grade-meta">${gTotal}票</span>
      </div>`;

    if(list.length===0){
      html+=`<div style="padding:12px;color:#bbb;font-size:13px;font-weight:700">まだ投票がありません</div>`;
    } else {
      list.forEach((r,i)=>{
        const rank=i+1;
        const rankCls=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
        const avgVal=r.total?r.sum/r.total:0;
        const barPct=maxAvg>0?(avgVal/maxAvg*100).toFixed(1):0;
        const sAvg=avg(r.studentSum,r.studentTotal);
        const vAvg=avg(r.visitorSum,r.visitorTotal);
        html+=`
        <div class="rank-row ${rankCls}">
          <div class="rank-badge ${rankCls}">${rank}</div>
          <div class="rank-info">
            <div class="rank-name">${r.venueName}</div>
            <div class="rank-bar-wrap">
              <div class="rank-bar-fill" style="width:${barPct}%"></div>
            </div>
          </div>
          <div class="rank-scores">
            <div class="rank-avg">${r.total?avgVal.toFixed(2):'—'}</div>
            <div class="rank-total">${r.total}票</div>
            ${r.total>0?`
            <div class="rank-split">
              ${r.studentTotal>0?`<span class="split-s">在校 ${sAvg}</span>`:''}
              ${r.visitorTotal>0?`<span class="split-v">来場 ${vAvg}</span>`:''}
            </div>`:''}
          </div>
        </div>`;
      });
    }
    html+='</div>';
  }
  if(!html) html='<div style="text-align:center;padding:40px;color:#ccc;font-weight:700">まだ投票データがありません</div>';
  rv.innerHTML=html;
}

function renderTable(){
  document.getElementById('rank-view').style.display='none';
  document.getElementById('table-view').style.display='block';

  const list = sorted(filtered());
  const tv = document.getElementById('table-view');
  let html=`<table>
    <thead><tr>
      <th>学年</th><th>会場名</th>
      <th>平均点</th><th>在校生平均</th><th>来場者平均</th>
      <th>総票数</th><th>在校生</th><th>来場者</th>
    </tr></thead><tbody>`;

  list.forEach(r=>{
    html+=`<tr>
      <td>${r.grade}</td>
      <td class="td-name">${r.venueName}</td>
      <td class="td-avg">${avg(r.sum,r.total)}</td>
      <td class="td-s">${avg(r.studentSum,r.studentTotal)}</td>
      <td class="td-v">${avg(r.visitorSum,r.visitorTotal)}</td>
      <td style="font-weight:700">${r.total}</td>
      <td>${r.studentTotal}</td>
      <td>${r.visitorTotal}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  tv.innerHTML=html;
}

// ===== コントロール =====
function setFilter(el){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter=el.dataset.grade;
  render();
}

function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-btn[id^="sort"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort-'+s).classList.add('active');
  render();
}

function toggleView(){
  viewMode = viewMode==='rank'?'table':'rank';
  document.getElementById('view-toggle').textContent =
    viewMode==='rank'?'📋 表表示':'🏆 ランク表示';
  render();
}

// ===== CSV =====
function exportCSV(){
  const rows=[['学年','会場名','平均点','在校生平均','来場者平均','投票総数','在校生票','来場者票']];
  for(const g of GRADE_ORDER){
    const list=sorted(allResults.filter(r=>r.grade===g));
    list.forEach(r=>{
      rows.push([
        r.grade, r.venueName,
        avg(r.sum,r.total), avg(r.studentSum,r.studentTotal), avg(r.visitorSum,r.visitorTotal),
        r.total, r.studentTotal, r.visitorTotal,
      ]);
    });
  }
  const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='立命祭2026_投票結果.csv';a.click();
  toast('📥 CSVをダウンロードしました');
}

// ===== リセット =====
async function confirmReset(){
  if(!confirm('全投票データをリセットしますか？\n⚠️ この操作は取り消せません')) return;
  const code=prompt('確認のため「RESET」と入力してください');
  if(code!=='RESET'){ toast('キャンセルしました'); return; }
  await fetch('/api/admin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({confirm:'RESET_ALL'})
  });
  toast('🗑 データをリセットしました');
  fetchResults();
}

// ===== トースト =====
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ===== 起動 =====
fetchResults();
setInterval(fetchResults, 5000);
</script>
</body>
</html>
